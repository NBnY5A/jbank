services:
  postgres:
    image: postgres:14.19-trixie
    container_name: jbank-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - "pg_data:/var/lib"

volumes:
  pg_data: {}